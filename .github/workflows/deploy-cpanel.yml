name: Deploy Alpha to cPanel

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: alpha-cpanel-deploy
  cancel-in-progress: true

jobs:
  checks:
    name: Run checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for merge conflict markers
        shell: bash
        run: |
          set -euo pipefail

          if grep -RInE \
            --exclude-dir=.git \
            --exclude-dir=.github \
            '^(<<<<<<<|=======|>>>>>>>)' .; then
            echo "Unresolved merge conflict markers found."
            exit 1
          fi

          echo "No merge conflict markers found."

      - name: Check for sensitive files
        shell: bash
        run: |
          set -euo pipefail

          forbidden_files="$(
            find . \
              -path './.git' -prune -o \
              -type f \( \
                -name '.env' -o \
                -name '*.pem' -o \
                -name '*.key' -o \
                -name 'id_rsa' -o \
                -name 'id_ed25519' \
              \) -print
          )"

          if [ -n "$forbidden_files" ]; then
            echo "Sensitive files found:"
            printf '%s\n' "$forbidden_files"
            exit 1
          fi

          echo "No sensitive files found."

      - name: Validate PHP syntax
        shell: bash
        run: |
          set -euo pipefail

          mapfile -d '' php_files < <(
            find . \
              -path './.git' -prune -o \
              -type f -name '*.php' -print0
          )

          if [ "${#php_files[@]}" -eq 0 ]; then
            echo "No PHP files found."
            exit 0
          fi

          failed=0

          for file in "${php_files[@]}"; do
            echo "Checking $file"
            php -l "$file" || failed=1
          done

          exit "$failed"

  deploy:
    name: Deploy changed files
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.CPANEL_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          printf '%s\n' "$SSH_PRIVATE_KEY" \
            | tr -d '\r' \
            > "$HOME/.ssh/alpha_cpanel_deploy"

          printf '%s\n' "$SSH_KNOWN_HOSTS" \
            | tr -d '\r' \
            > "$HOME/.ssh/known_hosts"

          chmod 600 "$HOME/.ssh/alpha_cpanel_deploy"
          chmod 600 "$HOME/.ssh/known_hosts"

          ssh-keygen -y \
            -f "$HOME/.ssh/alpha_cpanel_deploy" \
            > /dev/null

          echo "SSH private key loaded successfully."

      - name: Verify cPanel connection
        shell: bash
        env:
          HOST: ${{ secrets.CPANEL_HOST }}
          PORT: ${{ secrets.CPANEL_PORT }}
          USERNAME: ${{ secrets.CPANEL_USERNAME }}
          DEPLOY_PATH: ${{ secrets.CPANEL_DEPLOY_PATH }}
        run: |
          set -euo pipefail

          ssh \
            -i "$HOME/.ssh/alpha_cpanel_deploy" \
            -p "$PORT" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$USERNAME@$HOST" \
            "test -d '$DEPLOY_PATH' && test -w '$DEPLOY_PATH'"

          echo "cPanel connection verified."

      - name: Preview deployment
        shell: bash
        env:
          HOST: ${{ secrets.CPANEL_HOST }}
          PORT: ${{ secrets.CPANEL_PORT }}
          USERNAME: ${{ secrets.CPANEL_USERNAME }}
          DEPLOY_PATH: ${{ secrets.CPANEL_DEPLOY_PATH }}
        run: |
          set -euo pipefail

          rsync \
            --archive \
            --compress \
            --delete \
            --dry-run \
            --itemize-changes \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='*.log' \
            -e "ssh -i $HOME/.ssh/alpha_cpanel_deploy -p $PORT -o BatchMode=yes -o StrictHostKeyChecking=yes" \
            ./ \
            "$USERNAME@$HOST:$DEPLOY_PATH/"

      - name: Deploy to cPanel
        shell: bash
        env:
          HOST: ${{ secrets.CPANEL_HOST }}
          PORT: ${{ secrets.CPANEL_PORT }}
          USERNAME: ${{ secrets.CPANEL_USERNAME }}
          DEPLOY_PATH: ${{ secrets.CPANEL_DEPLOY_PATH }}
        run: |
          set -euo pipefail

          rsync \
            --archive \
            --compress \
            --delete \
            --itemize-changes \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='*.log' \
            -e "ssh -i $HOME/.ssh/alpha_cpanel_deploy -p $PORT -o BatchMode=yes -o StrictHostKeyChecking=yes" \
            ./ \
            "$USERNAME@$HOST:$DEPLOY_PATH/"

          echo "Deployment completed successfully."
