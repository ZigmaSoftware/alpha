name: Deploy Alpha to cPanel

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: alpha-cpanel-deploy
  cancel-in-progress: true

jobs:
  checks:
    name: Run checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for merge conflict markers
        run: |
          if grep -RInE \
            --exclude-dir=.git \
            --exclude-dir=.github \
            '^(<<<<<<<|=======|>>>>>>>)' .; then
            echo "Merge conflict markers found."
            exit 1
          fi

      - name: Check for sensitive files
        run: |
          forbidden_files="$(
            find . \
              -path './.git' -prune -o \
              -type f \( \
                -name '.env' -o \
                -name '*.pem' -o \
                -name '*.key' -o \
                -name 'id_rsa' -o \
                -name 'id_ed25519' \
              \) -print
          )"

          if [ -n "$forbidden_files" ]; then
            echo "Sensitive files found:"
            printf '%s\n' "$forbidden_files"
            exit 1
          fi

      - name: Validate PHP syntax
        run: |
          php_files=$(find . -type f -name '*.php')

          if [ -z "$php_files" ]; then
            echo "No PHP files found."
            exit 0
          fi

          failed=0

          while IFS= read -r file; do
            php -l "$file" || failed=1
          done <<< "$php_files"

          exit "$failed"

  deploy:
    name: Deploy changed files
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.CPANEL_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/alpha_cpanel_deploy
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

          chmod 600 ~/.ssh/alpha_cpanel_deploy
          chmod 600 ~/.ssh/known_hosts

      - name: Verify cPanel connection
        env:
          HOST: ${{ secrets.CPANEL_HOST }}
          PORT: ${{ secrets.CPANEL_PORT }}
          USERNAME: ${{ secrets.CPANEL_USERNAME }}
          DEPLOY_PATH: ${{ secrets.CPANEL_DEPLOY_PATH }}
        run: |
          ssh \
            -i ~/.ssh/alpha_cpanel_deploy \
            -p "$PORT" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$USERNAME@$HOST" \
            "test -d '$DEPLOY_PATH' && test -w '$DEPLOY_PATH'"

      - name: Deploy with rsync
        env:
          HOST: ${{ secrets.CPANEL_HOST }}
          PORT: ${{ secrets.CPANEL_PORT }}
          USERNAME: ${{ secrets.CPANEL_USERNAME }}
          DEPLOY_PATH: ${{ secrets.CPANEL_DEPLOY_PATH }}
        run: |
          rsync \
            --archive \
            --compress \
            --delete \
            --itemize-changes \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='*.log' \
            -e "ssh -i ~/.ssh/alpha_cpanel_deploy -p $PORT -o BatchMode=yes -o StrictHostKeyChecking=yes" \
            ./ \
            "$USERNAME@$HOST:$DEPLOY_PATH/"
